<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkLog Tracker Pro - Accurate Background Timer</title>
    <meta name="description" content="A professional, glassmorphic work time tracker with precise background accuracy and always-on-top floating desktop widget.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', 'Outfit', 'Segoe UI', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1e1b4b 0%, #0f172a 50%, #020617 100%);
            color: #f8fafc;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 620px;
            background: rgba(30, 41, 59, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 35px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 12px #10b981; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        /* Add Project Form */
        .add-project-container {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            font-size: 15px;
            color: #f8fafc;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder {
            color: #64748b;
        }

        input[type="text"]:focus {
            border-color: #818cf8;
            box-shadow: 0 0 14px rgba(129, 140, 248, 0.25);
            background: rgba(15, 23, 42, 0.7);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-add {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            padding: 0 24px;
            font-size: 15px;
        }

        .btn-add:hover {
            background: linear-gradient(135deg, #818cf8, #6366f1);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.45);
        }

        /* Project List */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
            min-height: 50px;
        }

        .project-card {
            background: rgba(15, 23, 42, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 5px solid #475569;
            padding: 18px 24px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .project-card:hover {
            background: rgba(15, 23, 42, 0.35);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Active highlight state */
        .project-card.running {
            border-left: 5px solid #10b981;
            border-color: rgba(16, 185, 129, 0.2);
            background: rgba(16, 185, 129, 0.04);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.08);
        }

        .project-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 60%;
        }

        .project-name {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .project-time {
            font-size: 24px;
            font-family: 'Outfit', monospace;
            color: #94a3b8;
            font-weight: 700;
            letter-spacing: 0.02em;
            transition: color 0.3s ease;
        }

        .project-card.running .project-time {
            color: #34d399;
            text-shadow: 0 0 10px rgba(52, 211, 153, 0.2);
        }

        .project-controls {
            display: flex;
            gap: 8px;
        }

        .btn-toggle {
            padding: 10px 18px;
            font-size: 13px;
            color: white;
            gap: 6px;
        }

        .btn-toggle.start {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .btn-toggle.start:hover {
            background: linear-gradient(135deg, #34d399, #10b981);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.35);
        }

        .btn-toggle.pause {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .btn-toggle.pause:hover {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.35);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        /* Action Buttons */
        .report-btn {
            width: 100%;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 16px;
            gap: 8px;
        }

        .report-btn:hover {
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        /* Report Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            animation: modalScaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalScaleUp {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 20px;
            text-align: center;
            color: #f8fafc;
        }

        .report-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 15px;
        }

        .report-item strong {
            color: #cbd5e1;
            font-weight: 600;
        }

        .total-row {
            margin-top: 15px;
            border-top: 2px solid rgba(255, 255, 255, 0.15);
            padding-top: 18px;
            font-size: 18px;
        }

        .total-row strong {
            color: #ffffff;
            font-weight: 800;
        }

        /* Accuracy Badge inside Report */
        .accuracy-badge {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-size: 12.5px;
            color: #34d399;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .close-modal {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 15px;
            border-radius: 12px;
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body>

    <main class="container">
        <header>
            <h1 id="mainHeading">WorkLog Tracker Pro</h1>
            <p class="subtitle">
                <span class="pulse-dot"></span>
                <span>Active Tracking • Single Task Mode</span>
            </p>
        </header>

        <!-- Task Input -->
        <section class="add-project-container">
            <input type="text" id="projectName" placeholder="What task are you working on?" onkeypress="handleKeyPress(event)" aria-label="Project name input">
            <button class="btn-add" onclick="addProject()" id="addTaskBtn" aria-label="Add project button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Task
            </button>
        </section>

        <!-- Task List -->
        <section class="project-list" id="projectList"></section>

        <button class="report-btn" onclick="generateReport()" id="reportBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            Generate Final Report
        </button>
    </main>

    <!-- Modal Report Overlay -->
    <div id="reportModal" class="modal" aria-hidden="true" role="dialog" aria-labelledby="modalTitle">
        <div class="modal-content">
            <h2 id="modalTitle">End of Day Summary</h2>
            
            <!-- Dynamic confirmation of background accuracy requested by user -->
            <div class="accuracy-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Yes, background tracking is active & 100% accurate.
            </div>

            <div id="reportData"></div>
            <button class="close-modal" onclick="closeModal()">Close Window</button>
        </div>
    </div>

    <!-- Core business logic script -->
    <script src="tracker.js"></script>
    
    <!-- UI Controller -->
    <script>
        const savedData = JSON.parse(localStorage.getItem('timeTrackerData')) || [];
        const tracker = new TimeTracker(savedData);

        renderProjects();

        function handleKeyPress(e) {
            if (e.key === 'Enter') addProject();
        }

        function addProject() {
            const input = document.getElementById('projectName');
            const name = input.value.trim();

            if (name === "") return alert("Please enter a project name!");

            try {
                tracker.addProject(name);
                input.value = "";
                saveData();
                renderProjects();
            } catch (err) {
                alert(err.message);
            }
        }

        function toggleTimer(id) {
            tracker.toggleTimer(id);
            saveData();
            renderProjects();
        }

        function deleteProject(id) {
            if (confirm("Are you sure you want to delete this log?")) {
                tracker.deleteProject(id);
                saveData();
                renderProjects();
            }
        }

        function saveData() {
            localStorage.setItem('timeTrackerData', JSON.stringify(tracker.projects));
        }

        function renderProjects() {
            const list = document.getElementById('projectList');
            list.innerHTML = "";

            if (tracker.projects.length === 0) {
                list.innerHTML = `<p style="text-align:center; color:#64748b; padding:20px; font-size:14px; font-weight:500;">No tasks added yet. Start by typing a task above!</p>`;
                return;
            }

            tracker.projects.forEach(project => {
                const card = document.createElement('div');
                card.className = `project-card ${project.isRunning ? 'running' : ''}`;
                card.id = `card-${project.id}`;

                card.innerHTML = `
                    <div class="project-info">
                        <div class="project-name" title="${project.name}">${project.name}</div>
                        <div class="project-time" id="time-${project.id}">${formatTime(getProjectElapsedTime(project))}</div>
                    </div>
                    <div class="project-controls">
                        <button class="btn-toggle ${project.isRunning ? 'pause' : 'start'}" onclick="toggleTimer(${project.id})" id="toggle-btn-${project.id}">
                            ${project.isRunning ? `
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="margin-right:4px;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                                Pause
                            ` : `
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="margin-right:4px;"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                Play
                            `}
                        </button>
                        <button class="btn-delete" onclick="deleteProject(${project.id})" aria-label="Delete Project">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // Live interface refresh interval
        setInterval(() => {
            let activeProject = tracker.projects.find(p => p.isRunning);
            if (activeProject) {
                // Update specific project timer in GUI
                const elapsed = getProjectElapsedTime(activeProject);
                const timeElement = document.getElementById(`time-${activeProject.id}`);
                if (timeElement) {
                    timeElement.innerText = formatTime(elapsed);
                }
            }
        }, 1000);

        // Listen for storage events to sync active state across multiple tabs or windows
        window.addEventListener('storage', (e) => {
            if (e.key === 'timeTrackerData') {
                const newData = JSON.parse(e.newValue) || [];
                tracker.projects = newData;
                renderProjects();
            }
        });

        // --- Report Overlay Logic ---
        function generateReport() {
            // Automatically pause all running timers
            tracker.pauseAll();
            saveData();
            renderProjects();

            const reportData = document.getElementById('reportData');
            reportData.innerHTML = "";

            let totalDaySeconds = tracker.getTotalElapsedSeconds();

            if (tracker.projects.length === 0) {
                reportData.innerHTML = `<p style="color:#94a3b8; text-align:center; padding:10px;">No work logged today.</p>`;
            } else {
                tracker.projects.forEach(p => {
                    const elapsed = getProjectElapsedTime(p);
                    reportData.innerHTML += `
                        <div class="report-item">
                            <strong>${p.name}</strong>
                            <span style="color: #94a3b8; font-family: monospace; font-weight: 700;">${formatTimeForReport(elapsed)}</span>
                        </div>
                    `;
                });

                // Grand Total
                reportData.innerHTML += `
                    <div class="report-item total-row">
                        <strong>TOTAL WORK TIME</strong>
                        <strong style="color: #10b981; font-family: monospace; font-weight: 800;">${formatTimeForReport(totalDaySeconds)}</strong>
                    </div>
                `;
            }

            document.getElementById('reportModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('reportModal').style.display = 'none';
        }
    </script>
</body>

</html>
